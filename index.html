<!doctype html>
<html lang="pt-BR" class="antialiased scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="" />
  <title>GC | Loading...</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="src/styles/main.css" />
  <script type="module" src="src/scripts/main.js" defer></script>
</head>

<body class="bg-[#050505] text-gray-300 selection:bg-blue-500/30 overflow-x-hidden">
  <a href="#main-content"
    class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-[100] focus:px-6 focus:py-3 focus:bg-blue-600 focus:text-white focus:rounded-xl"></a>

  <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden" aria-hidden="true">
    <div class="absolute -top-24 -right-24 w-96 h-96 bg-blue-600/10 blur-[120px] rounded-full"></div>
    <div class="absolute top-1/2 -left-48 w-[500px] h-[500px] bg-purple-600/5 blur-[150px] rounded-full"></div>
    <div class="absolute bottom-0 right-0 w-[600px] h-[600px] bg-blue-900/10 blur-[180px] rounded-full opacity-50">
    </div>
    <div class="absolute top-1/4 left-1/3 w-64 h-64 bg-blue-400/5 blur-[100px] rounded-full"></div>
  </div>

  <header class="fixed top-0 left-0 w-full z-50 glass py-4 px-6 md:px-12 border-b border-white/5">
    <nav class="max-w-7xl mx-auto flex justify-between items-center" aria-label="Main Navigation">
      <div class="text-white font-black tracking-tight text-2xl"></div>
      <div id="main-nav-links" class="hidden md:flex gap-10 text-xs font-bold uppercase tracking-[0.2em] text-gray-400">
      </div>
      <a href="#contact"
        class="px-6 py-2.5 rounded-full border border-blue-500/30 text-blue-400 text-xs font-black hover:bg-blue-500 hover:text-white transition-all uppercase tracking-widest"></a>
    </nav>
  </header>

  <main id="main-content" class="relative z-10 max-w-5xl mx-auto px-6 py-12 pt-32 space-y-32">
    <div id="loader" class="fixed inset-0 bg-[#050505] z-[100] flex justify-center items-center" role="status">
      <div class="relative w-16 h-16">
        <div class="absolute inset-0 border-4 border-blue-500/20 rounded-full"></div>
        <div class="absolute inset-0 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
      </div>
    </div>

    <section id="hero" class="hidden space-y-3 py-0 reveal">
      <div class="flex flex-col md:flex-row items-center gap-4 md:gap-12">
        <div id="user-img" class="w-full z-10 md:w-auto flex justify-center"></div>
        <div class="absolute md:relative inset-0 overflow-hidden z-0">
          <div class="absolute max-h-5rem inset-0 bg-gradient-to-b from-transparent via-transparent to-black z-1"></div>
          <div id="user-header" class="relative w-full font-mono text-[10px] md:text-sm text-green-400 leading-relaxed"></div>
        </div>
      </div>

      <div class="space-y-6">
        <h2
          class="text-blue-500 font-black tracking-[0.3em] uppercase text-[12px] sm:text-[14px] md:text-[18px] flex items-center gap-4">
          <span class="w-12 h-[1px] bg-blue-500/30"></span>
        </h2>
        <h1 id="user-name"
          class="text-6xl sm:text-7xl md:text-8xl font-black text-white tracking-tighter leading-[0.85]"></h1>
      </div>
      <p id="user-title" class="text-2xl md:text-4xl text-gray-400 max-w-4xl leading-tight font-medium tracking-tight">
      </p>
      <div id="hero-highlights-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6 pt-12 border-t border-white/5"></div>
      <div class="flex flex-wrap gap-6 pt-6"></div>
    </section>

    <section id="about" class="hidden space-y-16 reveal">
      <header class="flex items-center gap-8">
        <h2 class="text-xl sm:text-3xl font-black text-white uppercase tracking-tighter shrink-0"></h2>
        <div class="h-[1px] flex-1 bg-white/5"></div>
      </header>
      <p id="user-summary" class="text-xl md:text-2xl text-justify text-gray-400 leading-relaxed font-light max-w-4xl">
      </p>
    </section>

    <section id="skills" class="hidden space-y-16 reveal">
      <header class="flex items-center gap-8">
        <h2 class="text-xl sm:text-3xl font-black text-white uppercase tracking-tighter shrink-0"></h2>
        <div class="h-[1px] flex-1 bg-white/5"></div>
      </header>
      <div class="grid grid-cols-1 md:grid-cols-12 gap-8">
        <div id="featured-skill"
          class="md:col-span-12 lg:col-span-5 angular-card p-12 rounded-[3rem] space-y-8 relative overflow-hidden group shadow-2xl shadow-blue-500/5">
        </div>
        <div id="secondary-skills" class="md:col-span-12 lg:col-span-7 grid md:grid-cols-2 gap-8"></div>
      </div>
    </section>

    <section id="experience" class="hidden space-y-24 reveal">
      <header class="flex items-center gap-8">
        <h2 class="text-xl sm:text-3xl font-black text-white uppercase tracking-tighter shrink-0"></h2>
        <div class="h-[1px] flex-1 bg-white/10"></div>
      </header>
      <div id="experience-list" class="space-y-32"></div>
    </section>

    <section id="projects" class="hidden space-y-24 reveal">
      <header class="flex items-center gap-8">
        <h2 class="text-xl sm:text-3xl font-black text-white uppercase tracking-tighter shrink-0"></h2>
        <div class="h-[1px] flex-1 bg-white/10"></div>
      </header>
      <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 gap-10"></div>
    </section>

    <section id="education-section" class="reveal space-y-16">
      <header class="flex items-center gap-8">
        <h2 class="text-xl sm:text-3xl font-black text-white uppercase tracking-tighter shrink-0"></h2>
        <div class="h-[1px] flex-1 bg-white/10"></div>
      </header>
      <div id="education-list" class="glass rounded-[2rem] overflow-hidden"></div>
    </section>

    <footer id="contact" class="hidden border-t border-white/5 pt-32 pb-48 text-center space-y-12 reveal">
      <h2 class="text-3xl sm:text-5xl md:text-8xl font-black text-white tracking-tighter leading-[0.9]"></h2>
      <p class="text-xl sm:text-2xl text-gray-500 max-w-2xl mx-auto font-light leading-snug"></p>
      <div id="contact-links" class="pt-10 flex flex-wrap justify-center gap-8"></div>
      <p class="text-[12px] uppercase font-black tracking-[0.3em] text-gray-500 pt-20"></p>
    </footer>
  </main>
</body>

</html>
